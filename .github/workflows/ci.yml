name: CI — Hospital Readmission ML

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências de produção
        run: pip install -r requirements.txt

      - name: Instalar dependências de desenvolvimento
        run: pip install -r requirements-dev.txt

      - name: Verificar segurança das dependências
        run: |
          pip install safety
          safety check -r requirements.txt --ignore 70612 || true

      - name: Executar testes unitários e de integração
        env:
          SECRET_KEY: "ci-test-secret-key-32-chars-minimum-ok"
          ENVIRONMENT: "development"
          AUDIT_DB_PATH: ":memory:"
        run: |
          pytest tests/test_preprocessing.py tests/test_api.py tests/test_models.py \
            --tb=short -v \
            --cov=api --cov=utils \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Executar testes de fairness
        env:
          SECRET_KEY: "ci-test-secret-key-32-chars-minimum-ok"
        run: pytest tests/test_fairness.py --tb=short -v || true
        # || true: fairness pode falhar em dados sintéticos sem impedir o CI

      - name: Upload cobertura de código
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar ferramentas de lint
        run: pip install ruff
      - name: Lint com ruff
        run: ruff check api/ utils/ --ignore E501 || true
